syntax = "proto3";

package sensors;

import "google/protobuf/timestamp.proto";

// Define the Go package path for generated code
option go_package = "://github.com";

service SensorService {
  // Client-side streaming: The generator sends a continuous stream of data
  // to the ingestion service, which returns a single summary response.
  rpc IngestSensors(stream SensorData) returns (IngestResponse);
}

message SensorData {
  string sensor = 1;                    
  double value = 2;                     
  google.protobuf.Timestamp timestamp = 3; 
}

message IngestResponse {
  bool success = 1;
  string message = 2;
}
